<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso administrador</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { font-size: 1.2rem; margin-bottom: 6px; }
    p { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
    label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; }
    input[type=password] { width: 100%; padding: 12px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; }
    input[type=password]:focus { outline: none; border-color: #2e7d32; }
    button { width: 100%; padding: 13px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #1b5e20; }
    .flash { background: #ffebee; border-left: 4px solid #b71c1c; padding: 10px 14px; border-radius: 4px; font-size: 0.9rem; color: #b71c1c; margin-bottom: 16px; }
    .volver { display: block; text-align: center; margin-top: 16px; font-size: 0.85rem; color: #888; text-decoration: none; }
    .volver:hover { color: #222; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Área de administración</h1>
    <p>Solo para personal autorizado</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <label>Contraseña</label>
      <input type="password" name="password" autofocus placeholder="••••••••">
      <button type="submit">Entrar</button>
    </form>

    <a href="/" class="volver">← Volver a la búsqueda</a>
  </div>
</body>
</html>
